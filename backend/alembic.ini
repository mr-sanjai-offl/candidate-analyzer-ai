# Alembic Configuration
# Architecture Bible Section 4: Alembic for database migrations.

[alembic]
script_location = alembic
prepend_sys_path = .

# Connection string is set programmatically in env.py
# from Pydantic Settings (Architecture Section 7).
# sqlalchemy.url is intentionally left blank here.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
